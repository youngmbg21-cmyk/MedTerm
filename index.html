<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MedTerminal — Research Workspace</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
</head>
<body>

<!-- Mobile overlay -->
<div id="mobile-overlay" class="mobile-overlay"></div>

<!-- Sidebar nav -->
<aside id="sidebar" class="sidebar-nav fixed top-0 left-0 bottom-0 w-[240px] border-r flex flex-col z-30" style="border-color:var(--line); background:var(--bg);">
  <div class="px-5 pt-6 pb-5 border-b" style="border-color:var(--line-soft);">
    <div class="flex items-center gap-2">
      <div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:var(--sage-deep);">
        <span class="serif text-white text-base">M</span>
      </div>
      <div>
        <div class="serif text-base leading-none" style="color:var(--ink);">MedTerminal</div>
        <div class="micro mt-1" style="color:var(--clay);">Research Workspace</div>
      </div>
    </div>
  </div>

  <nav id="nav-root" class="flex-1 px-3 py-4 overflow-y-auto"></nav>

  <div class="px-4 py-4 border-t" style="border-color:var(--line-soft);">
    <button class="btn btn-line w-full justify-center" id="open-chat-btn">
      <span>💬</span><span>Assistant</span>
    </button>
    <div class="flex items-center justify-between mt-3">
      <a class="text-xs cursor-pointer" id="settings-link" style="color:var(--ink-mute);">Settings</a>
      <span class="micro" id="version-tag" style="color:var(--ink-mute);">v0.3</span>
    </div>
  </div>
</aside>

<!-- Main area -->
<main class="main-area" style="padding-left:240px; min-height:100vh;">
  <header class="sticky top-0 z-20" style="background:rgba(245,241,234,0.92); backdrop-filter:saturate(150%) blur(8px); border-bottom:1px solid var(--line-soft);">
    <div class="px-8 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button class="hamburger" id="hamburger-btn" aria-label="Menu">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="5" x2="17" y2="5"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="15" x2="17" y2="15"/></svg>
        </button>
        <div>
          <h1 id="page-title" class="serif text-xl">Overview</h1>
          <div id="page-question" class="text-xs mt-0.5" style="color:var(--ink-mute);"></div>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <span id="sync-status" class="chip chip-line">Loading…</span>
        <button class="btn btn-ghost" id="refresh-btn">↻ Refresh</button>
      </div>
    </div>
  </header>

  <div id="page" class="px-8 py-8 max-w-[1200px]"></div>
</main>

<!-- Assistant side panel -->
<aside id="chat-panel" class="chat-panel closed">
  <div class="px-5 py-4 border-b flex items-center justify-between" style="border-color:var(--line-soft);">
    <div>
      <div class="serif text-lg leading-none">Research assistant</div>
      <div class="micro mt-1" style="color:var(--ink-mute);">Reads your data · advises next steps</div>
    </div>
    <div class="flex items-center gap-2">
      <button class="btn btn-ghost text-xs" id="clear-chat-btn" title="Clear conversation">Clear</button>
      <button class="btn btn-ghost" id="close-chat-btn" aria-label="Close">✕</button>
    </div>
  </div>

  <div id="chat-messages" class="flex-1 overflow-y-auto px-5 py-4 flex flex-col gap-3"></div>

  <div id="chat-quick" class="px-5 py-3 border-t flex flex-wrap gap-2" style="border-color:var(--line-soft);"></div>

  <div class="px-5 py-4 border-t" style="border-color:var(--line-soft);">
    <div class="flex gap-2 items-end">
      <textarea id="chat-input" class="textarea" rows="2" placeholder="Ask anything about the project state…"></textarea>
      <button class="btn btn-primary" id="send-chat-btn">Send</button>
    </div>
  </div>
</aside>

<!-- Modal container -->
<div id="modal-root"></div>

<!-- Boot -->
<script type="module">
  import { loadAllData, renderCurrentRoute, buildNav, go, openSidebar, closeSidebar } from './js/app.js';
  import { DATA_MODE, AI_MODE } from './js/config.js';
  import { initChat } from './js/chat.js';

  // Screen modules (each registers its routes)
  import './js/screens/overview.js';
  import './js/screens/outreach.js';
  import './js/screens/interviews.js';
  import './js/screens/matrix.js';
  import './js/screens/saturation.js';
  import './js/screens/scripts.js';
  import './js/screens/templates.js';
  import './js/screens/manual.js';
  import './js/screens/sensemaking.js';
  import './js/screens/economics.js';
  import './js/screens/decision.js';
  import './js/screens/reports.js';
  import './js/screens/documents.js';
  import './js/screens/settings.js';

  document.getElementById('hamburger-btn').addEventListener('click', openSidebar);
  document.getElementById('mobile-overlay').addEventListener('click', closeSidebar);
  document.getElementById('refresh-btn').addEventListener('click', () => loadAllData());
  document.getElementById('settings-link').addEventListener('click', () => { go('settings'); closeSidebar(); });

  buildNav();
  initChat();

  window.addEventListener('hashchange', renderCurrentRoute);
  if (!location.hash) location.hash = 'overview';
  renderCurrentRoute();

  // api data mode needs login for data; worker AI mode needs it for identity
  // (the worker authenticates every AI call with the same magic-link JWT).
  if (DATA_MODE === 'api' || AI_MODE === 'worker') {
    const { requireLogin } = await import('./js/auth.js');
    await requireLogin();
  }
  await loadAllData();
</script>
</body>
</html>
