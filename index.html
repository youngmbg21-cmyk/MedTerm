<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MedTerminal — Research Workspace</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
</head>
<body>

<!-- Mobile overlay -->
<div id="mobile-overlay" class="mobile-overlay" onclick="closeSidebar()"></div>

<!-- Sidebar nav -->
<aside id="sidebar" class="sidebar-nav fixed top-0 left-0 bottom-0 w-[240px] border-r flex flex-col z-30" style="border-color:var(--line); background:var(--bg);">
  <div class="px-5 pt-6 pb-5 border-b" style="border-color:var(--line-soft);">
    <div class="flex items-center gap-2">
      <div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:var(--sage-deep);">
        <span class="serif text-white text-base">M</span>
      </div>
      <div>
        <div class="serif text-base leading-none" style="color:var(--ink);">MedTerminal</div>
        <div class="micro mt-1" style="color:var(--clay);">Research Workspace</div>
      </div>
    </div>
  </div>

  <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
    <div class="micro px-3 mb-2" style="color:var(--ink-mute);">Daily</div>
    <a class="nav-item" data-route="dashboard"><span class="dot"></span>Dashboard</a>
    <a class="nav-item" data-route="outreach"><span class="dot"></span>Outreach</a>
    <a class="nav-item" data-route="interviews"><span class="dot"></span>Interviews</a>
    <a class="nav-item" data-route="matrix"><span class="dot"></span>Theme matrix</a>
    <a class="nav-item" data-route="saturation"><span class="dot"></span>Saturation</a>

    <div class="micro px-3 mt-5 mb-2" style="color:var(--ink-mute);">Reference</div>
    <a class="nav-item" data-route="scripts"><span class="dot"></span>Scripts</a>
    <a class="nav-item" data-route="templates"><span class="dot"></span>Templates</a>
    <a class="nav-item" data-route="manual"><span class="dot"></span>Operating manual</a>

    <div class="micro px-3 mt-5 mb-2" style="color:var(--ink-mute);">Phase 5</div>
    <a class="nav-item" data-route="decisions"><span class="dot"></span>Decisions</a>
  </nav>

  <div class="px-4 py-4 border-t" style="border-color:var(--line-soft);">
    <button class="btn btn-line w-full justify-center" onclick="toggleChat()">
      <span>💬</span><span>Open assistant</span>
    </button>
    <div class="micro mt-3 text-center" style="color:var(--ink-mute);">v0.2 · phase 0</div>
  </div>
</aside>

<!-- Main area -->
<main class="main-area" style="padding-left:240px; min-height:100vh;">
  <!-- Top bar -->
  <header class="sticky top-0 z-20" style="background:rgba(245,241,234,0.92); backdrop-filter:saturate(150%) blur(8px); border-bottom:1px solid var(--line-soft);">
    <div class="px-8 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button class="hamburger" onclick="openSidebar()" aria-label="Menu">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="5" x2="17" y2="5"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="15" x2="17" y2="15"/></svg>
        </button>
        <div>
          <div class="micro" style="color:var(--ink-mute);">Current phase</div>
          <h1 id="page-title" class="serif text-xl mt-0.5">Dashboard</h1>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <span id="sync-status" class="chip chip-line">Loading…</span>
        <button class="btn btn-ghost" onclick="window.__refresh()">↻ Refresh</button>
        <button class="btn btn-primary" onclick="toggleChat()">Ask assistant</button>
      </div>
    </div>
  </header>

  <!-- Page container -->
  <div id="page" class="px-8 py-8 max-w-[1200px]"></div>
</main>

<!-- Chatbot side panel -->
<aside id="chat-panel" class="chat-panel closed">
  <div class="px-5 py-4 border-b flex items-center justify-between" style="border-color:var(--line-soft);">
    <div>
      <div class="serif text-lg leading-none">Research assistant</div>
      <div class="micro mt-1" style="color:var(--ink-mute);">Reads your data · advises next steps</div>
    </div>
    <button class="btn btn-ghost" onclick="toggleChat()" aria-label="Close">✕</button>
  </div>

  <div id="chat-messages" class="flex-1 overflow-y-auto px-5 py-4 flex flex-col gap-3"></div>

  <div class="px-5 py-3 border-t flex flex-wrap gap-2" style="border-color:var(--line-soft);">
    <button class="quick-action" onclick="quickPrompt('Give me a one-paragraph status of where the project is right now. Be specific. Use the data.')">Status check</button>
    <button class="quick-action" onclick="quickPrompt('Assess our progress against the current phase exit criteria. What still needs to be done?')">Phase exit check</button>
    <button class="quick-action" onclick="quickPrompt('What is the single most important thing I should do today, given the state of the project? Be specific — name a person, a deliverable, or an interview.')">What now?</button>
    <button class="quick-action" onclick="quickPrompt('Surface the strongest themes emerging from the matrix. Quote specific entries. Flag where evidence is still thin.')">Surface themes</button>
  </div>

  <div class="px-5 py-4 border-t" style="border-color:var(--line-soft);">
    <div class="flex gap-2 items-end">
      <textarea id="chat-input" class="textarea" rows="2" placeholder="Ask anything about the project state…" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendChat();}"></textarea>
      <button class="btn btn-primary" onclick="sendChat()">Send</button>
    </div>
  </div>
</aside>

<!-- Modal container -->
<div id="modal-root"></div>

<!-- Boot: load modules -->
<script type="module">
  import { WORKER_URL, loadAllData, setSync, renderCurrentRoute, go } from './js/app.js';
  import './js/chat.js';

  // Load all screen modules
  import './js/screens/dashboard.js';
  import './js/screens/outreach.js';
  import './js/screens/interviews.js';
  import './js/screens/matrix.js';
  import './js/screens/saturation.js';
  import './js/screens/scripts.js';
  import './js/screens/templates.js';
  import './js/screens/manual.js';
  import './js/screens/decisions.js';

  // Mobile sidebar
  window.openSidebar = () => {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('mobile-overlay').classList.add('open');
  };
  window.closeSidebar = () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('mobile-overlay').classList.remove('open');
  };

  // Refresh button
  window.__refresh = () => loadAllData(true);

  // Router wiring
  window.addEventListener('hashchange', renderCurrentRoute);
  document.querySelectorAll('[data-route]').forEach(el => {
    el.addEventListener('click', () => {
      go(el.dataset.route);
      window.closeSidebar();
    });
  });

  // Boot
  if (!location.hash) location.hash = 'dashboard';
  renderCurrentRoute();
  if (WORKER_URL.includes('YOUR-WORKER')) {
    setSync('Set WORKER_URL in js/app.js', 'rose');
  } else {
    await loadAllData();
  }
</script>
</body>
</html>
